<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>ROPA DEPORTIVA</h1>
</header>

<div class="contenedor">
    <div class="icono-carrito" onclick="toggleCarrito()">
  🛒 <span id="contador">0</span>
</div>

<div class="carrito" id="carrito">
  <h2>Carrito</h2>
  <div id="lista"></div>
  <p>Total: $<span id="total">0</span></p>
</div>

    <div class="grid">

        <div class="card">
            <h3>POLO MANGA LARGA</h3>
            <img src="img/polo1.jpg">
            <p>$30.00</p>
            <button>Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>LICRA</h3>
            <img src="img/polo2.jpg">
            <p>$25.00</p>
            <button>Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>CONJUNTO DEPORTIVO NEGRO</h3>
            <a href="polo3.html"><img src="img/polo3.jpg"></a>
            <p>$50.00</p>
            <button  onclick="agregar('CONJUNTO DEPORTIVO', 50)">Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>CONJUNT DEPORTIVO BLANCO</h3>
            <img src="img/polo4.jpg">
            <p>$15.00</p>
            <button>Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>LONG SLEEVE SPORTS SET</h3>
            <img src="img/polo5.jpg">
            <p>$40.00</p>
            <button onclick="agregar('CONJUNTO DE GIMNASIO COLOR BLACK, $25.00')">Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>LONG SLEEVE SPORTS SET 2</h3>
            <img src="img/polo6.jpg">
            <p>$30.00</p>
            <button onclick="agregar('CONJUNTO DE GIMNASIO COLOR BLACK, $25.00')">Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>LONG SLEEVE SPORTS SET 3</h3>
            <img src="img/polo7.jpg">
            <p>$25.00</p>
            <button onclick="agregar('CONJUNTO DE GIMNASIO COLOR BLACK, $25.00')">Agregar al carrito</button>
        </div>

        <div class="card">
            <h3>LONG SLEEVE SPORTS SET 4</h3>
            <img src="img/polo8.jpg">
            <p>$15.00</p>
            <button onclick="agregar('CONJUNTO DE GIMNASIO COLOR BLACK, $25.00')">Agregar al carrito</button>
        </div>

    
       <div class="buscador">
  <input type="text" id="buscar" placeholder="Buscar producto...">
</div>
</div>

    
</body>
</html>
