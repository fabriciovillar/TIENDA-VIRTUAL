<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Producto</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body 
    { 
        font-family: Arial, sans-serif;
        margin: 50px; padding: 0; 
    }
    .container {
        display: flex;
        align-items: flex-start;
        gap: 100px;
        padding: 40px; 
    }
    .imagen-producto img {
        max-width: 400px;
        border: 1px solid #ddd;
        border-radius: 8px; 
        margin-left: 300px;
    }
    .info-producto 
    {
        max-width: 400px;
        margin-left: 50px; 
    }
    .precio {
        font-size: 17px;
        color: #776365;
        font-weight: bold;
    }
    .tallas { 
        margin: 15px 0; 
    }
    .tallas button { 
        margin-right: 10px; 
        padding: 8px 12px; 
        border: 1px solid #333; 
        background: #fff; 
        cursor: pointer; 
    }
    .cantidad {
        display: flex;
        align-items: center; 
        justify-content: center; 
        gap: 15px; 
        margin: 20px 0; 
        background: #f5f5f5; 
        border: 2px solid #333; 
        border-radius: 8px; 
        padding: 10px; 
        width: 150px; 
    }
    .cantidad button {
        width: 35px; 
        height: 35px; 
        font-size: 20px; 
        cursor: pointer; 
        border: none; 
        background: #111;
        color: #fff;
        border-radius: 5px; 
    }
    .cantidad span {
        font-size: 20px;
        min-width: 30px; 
        text-align: center; 
        font-weight: bold; 
    }
    .btn-carrito {
        border-radius: 50px; 
        background: #a9a4a4; 
        color: #fff; 
        padding: 12px 30px; 
        border: none; 
    }
    .descripcion {
        margin-top: 30px; 
        line-height: 1.5; 
    }
    a.volver {
        display: inline-block; 
        margin-top: 20px; 
        text-decoration: none; 
        color: #333; 
    }
    .precio-final {
        font-size: 15px;
        color: red; 
    }
    .popup-carrito { 
        position: fixed;
        right: 20px; 
        top: 60px; 
        width: 300px; 
        background: #fff; 
        border: 2px solid #333; 
        border-radius: 8px; 
        padding: 15px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        z-index: 1000; 
        display:none; 
    }
    .popup-carrito h2 {
        margin-top: 0px; 
    }
    .popup-carrito button { 
        margin: 5px; 
        padding: 8px 12px; 
        border: none; 
        background: #111; 
        color: #fff; 
        cursor: pointer; 
        border-radius: 5px; 
    }
    .icono-carrito {
        position: fixed;
        top: 20px;      
        right: 20px;   
        cursor: pointer;
        font-size: 24px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Detalle del Producto</h1>
  </header>

    <!-- Ícono del carrito -->
  <div class="icono-carrito" onclick="mostrarCarrito()">
    🛒 <span id="contador">0</span>
  </div>

  <!-- Panel flotante del carrito -->
  <div id="popupCarrito" class="popup-carrito">
    <h2>Carrito de Compras</h2>
    <div id="listaCarrito"></div>
    <p>Total: S/<span id="totalCarrito">0.00</span></p>
    <button onclick="verCarrito()">Ver carrito</button>
    <button onclick="checkout()">Finalizar compra</button>
  </div>

  <div class="container">
    <!-- Imagen -->
    <div class="imagen-producto">
      <img src="/polo3.jpg" alt="CONJUNTO DEPORTIVO NEGRO">
    </div>

    <!-- Información -->
    <div class="info-producto">
      <h2>CONJUNTO DEPORTIVO NEGRO</h2>
      <p class="precio">S/<span id="precio">50.00</span></p>
      <p class="precio-final">PRECIO FINAL</p>
      <hr>

      <div class="tallas">
        <strong>Tallas disponibles:</strong><br>
        <button>S</button>
        <button>M</button>
        <button>L</button>
      </div>

      <!-- Control de cantidad -->
      <div class="cantidad">
        <button onclick="cambiarCantidad(-1)">-</button>
        <span id="cantidad">0</span>
        <button onclick="cambiarCantidad(1)">+</button>
      </div>

      <button class="btn-carrito" onclick="agregarProducto()">Añadir al carrito</button>

      <div class="descripcion">
        <h3>Descripción</h3>
        <p>Este es un producto deportivo de alta calidad, ideal para tus entrenamientos y estilo casual.</p>
        <a href="/hombre.html" class="volver">⬅ Volver a la tienda</a>
      </div>
    </div>
  </div>


  <script>
    // Control de cantidad
    let cantidad = 0;
    function cambiarCantidad(valor) {
      cantidad += valor;
      if (cantidad < 0) cantidad = 0;
      document.getElementById("cantidad").textContent = cantidad;
    }

    let carrito = [];
    let total = 0;

    // Agregar producto al carrito con cantidad seleccionada
    function agregarProducto() {
      if (cantidad > 0) {
        agregar('CONJUNTO DEPORTIVO NEGRO', 50, cantidad);
        cantidad = 0;
        document.getElementById("cantidad").textContent = cantidad;
      } else {
        alert("Selecciona al menos 1 unidad");
      }
    }

    function agregar(nombre, precio, cant=1) {
      let producto = carrito.find(p => p.nombre === nombre);
      if (producto) {
        producto.cantidad += cant;
      } else {
        carrito.push({ nombre, precio, cantidad: cant });
      }
      actualizarCarrito();
    }

    function actualizarCarrito() {
      let contador = carrito.reduce((acc, p) => acc + p.cantidad, 0);
      document.getElementById("contador").textContent = contador;

      let lista = document.getElementById("listaCarrito");
      lista.innerHTML = "";
      total = 0;

      carrito.forEach(p => {
        total += p.precio * p.cantidad;
        lista.innerHTML += `
          <div>
            ${p.nombre} - ${p.cantidad} × S/${p.precio.toFixed(2)}
            <button onclick="sumar('${p.nombre}')">+</button>
            <button onclick="restar('${p.nombre}')">-</button>
            <button onclick="eliminar('${p.nombre}')">Eliminar</button>
          </div>
        `;
      });

      document.getElementById("totalCarrito").textContent = total.toFixed(2);
    }

    function mostrarCarrito() {
      let popup = document.getElementById("popupCarrito");
      popup.style.display = (popup.style.display === "none" || popup.style.display === "") ? "block" : "none";
    }

    function sumar(nombre) {
      let producto = carrito.find(p => p.nombre === nombre);
      producto.cantidad++;
      actualizarCarrito();
    }
    function restar(nombre) {
      let producto = carrito.find(p => p.nombre === nombre);
      if (producto.cantidad > 1) {
        producto.cantidad--;
      } else {
        eliminar(nombre);
      }
      actualizarCarrito();
    }
    function eliminar(nombre) {
      carrito = carrito.filter(p => p.nombre !== nombre);
      actualizarCarrito();
    }

    function verCarrito() {
      alert("Aquí iría la página de carrito completo");
    }
    function checkout() {
      alert("Finalizar compra: Total S/" + total.toFixed(2));
    }
  </script>
</body>
</html>
